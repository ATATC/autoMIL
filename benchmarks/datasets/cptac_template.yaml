# CPTAC Dataset Configuration Template
#
# How to use:
# 1. Copy this file: cp cptac_template.yaml cptac_{code}.yaml  (e.g., cptac_ccrcc.yaml)
# 2. Update name, description, paths.data_root env var name
# 3. Run prepare_cptac_manifest.py to generate normalized_manifest.csv from Patho-Bench
# 4. Define tasks matching the {GENE}_binary columns the script produces
# 5. Add AUTOBENCH_CPTAC_{CODE}_ROOT to benchmarks/.env
#
# Reference: See docs/cptac_feature_extraction_tutorial.md for the full workflow.
# Key difference from TCGA: labels come from Patho-Bench (HuggingFace), not GOLDMARK.

name: cptac_ccrcc  # e.g., cptac_ccrcc, cptac_brca (lowercase, no hyphens)
description: "CPTAC-CCRCC — Clear Cell Renal Cell Carcinoma"

paths:
  data_root: "${AUTOBENCH_CPTAC_CCRCC_ROOT}"          # Set in benchmarks/.env
  wsi_dir: "${data_root}/wsi"                           # Flat directory of .svs files from TCIA
  mapping_csv: "${data_root}/normalized_manifest.csv"   # Generated by prepare_cptac_manifest.py
  output_dir: "${data_root}/trident_output"
  benchmark_dir: "${data_root}/benchmark"
  features_base_dir: "${output_dir}/20x_224px_0px_overlap"

# One entry per Patho-Bench task.
# label_col must match the {GENE}_binary column in normalized_manifest.csv.
# To list available tasks for a cohort, see docs/cptac_feature_extraction_tutorial.md
# or check: https://huggingface.co/datasets/MahmoodLab/Patho-Bench
tasks:
  bap1:
    label_col: "BAP1_binary"
    label_map:
      0: "wildtype"
      1: "mutant"
    n_classes: 2
  vhl:
    label_col: "VHL_binary"
    label_map:
      0: "wildtype"
      1: "mutant"
    n_classes: 2

split_strategies:
  standard:
    train_cohorts: []
    test_cohorts: []

task_strategy_feasibility:
  bap1: ["standard"]
  vhl: ["standard"]

# Patho-Bench slide_id is a filename stem with no extension.
# This matches TRIDENT .h5 file naming directly (no transform needed).
# case_id is the patient-level ID from Patho-Bench.
slide_id_column: "slide_id"
slide_id_transform: null
wsi_extension: ".svs"             # Appended when looking up WSI files on disk
case_id_column: "case_id"
status_column: null
status_value: null

# Only the 3 target encoders for this round of extraction.
encoders:
  models:
    "paige-ai/Virchow2": "virchow2"
    "bioptimus/H-optimus-1": "hoptimus1"
    "MahmoodLab/UNI2-h": "uni_v2"
  dims:
    virchow2: 2560
    hoptimus1: 1536
    uni_v2: 1536

nnmil_models:
  - ab_mil
  - trans_mil

extraction:
  magnification: 20
  patch_size: 224
  batch_size: 64
